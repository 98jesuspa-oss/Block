{% extends "base.html" %}
{% load static %}

{% block title %}Productos — VerdeBlock POS{% endblock %}
{% block page_title %}Productos{% endblock %}

{% block topbar_actions %}
<div class="vb-search">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input id="prod-search" name="q" placeholder="Buscar producto…"
         hx-get="{% url 'products:table' %}"
         hx-trigger="keyup changed delay:350ms"
         hx-target="#products-table"
         hx-include="#prod-cat-filter"
         value="{{ request.GET.q|default:'' }}">
</div>
<select id="prod-cat-filter" name="cat"
        hx-get="{% url 'products:table' %}"
        hx-trigger="change"
        hx-target="#products-table"
        hx-include="#prod-search"
        class="vb-select">
  <option value="">Todas las categorias</option>
  {% for v,l in categorias %}
  <option value="{{ v }}" {% if request.GET.cat == v %}selected{% endif %}>{{ l }}</option>
  {% endfor %}
</select>
<button class="vb-btn vb-btn-primary vb-btn-md"
        hx-get="{% url 'products:form' %}"
        hx-target="#modal-container"
        hx-swap="innerHTML">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Nuevo producto
</button>
{% endblock %}

{% block content %}

{% include "products/partials/table.html" %}

<!-- Producto detail modal -->
<div id="modal-container" x-data="productoModalStore()" @products:reload.window="close()"></div>

{% endblock %}
