{% load static %}
<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>VerdeBlock POS — Iniciar sesion</title>
<link rel="icon" type="image/png" href="{% static 'img/logo-verdeblock.png' %}">
<style>[x-cloak]{display:none!important}</style>
<link rel="stylesheet" href="{% static 'css/verdeblock.css' %}">
<script src="{% static 'js/app.js' %}"></script>
<script src="{% static 'js/alpine.min.js' %}" defer></script>
</head>
<body x-data x-init="$store.theme.init()" :data-theme="$store.theme.theme">

<script id="login-users-data" type="application/json">{{ users_json|safe }}</script>

<div class="vb-login" x-data="loginStore()">

  <!-- Toggle tema -->
  <button class="vb-login-theme" @click="$store.theme.toggle()" title="Cambiar tema">
    <svg x-show="$store.theme.theme === 'light'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg x-show="$store.theme.theme === 'dark'"  width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="vb-login-card">

    <!-- Brand -->
    <div class="vb-login-brand">
      <div class="vb-login-logo">
        <img src="{% static 'img/logo-verdeblock.png' %}" alt="VerdeBlock">
      </div>
      <div>
        <div class="vb-login-name">Verde<span style="color:var(--brand-ink)">Block</span></div>
        <div class="vb-login-sub">Punto de venta</div>
      </div>
    </div>

    <!-- Step: seleccionar usuario -->
    <div x-show="step === 'users'">
      <div class="vb-login-title">¿Quién eres?</div>
      <div class="vb-login-help">Selecciona tu nombre para iniciar sesión</div>

      <div class="vb-login-users">
        <template x-for="u in users" :key="u.id">
          <button class="vb-login-user" @click="selectUser(u)">
            <div class="vb-avatar vb-avatar-lg"
                 :style="`background:${getColor(u.name,'soft')};color:${getColor(u.name,'ink')};`"
                 x-text="u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()">
            </div>
            <div class="vb-login-user-name" x-text="u.name"></div>
            <div class="vb-login-user-rol" x-text="u.role"></div>
          </button>
        </template>
      </div>
    </div>

    <!-- Step: ingresar PIN -->
    <div x-show="step === 'pin'" x-cloak>
      <button class="vb-login-back" @click="back()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Cambiar usuario
      </button>

      <div class="vb-login-who">
        <div class="vb-avatar vb-avatar-lg"
             :style="`background:${getColor(user?.name||'','soft')};color:${getColor(user?.name||'','ink')};`">
          <span x-text="user?.name?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()"></span>
        </div>
        <div>
          <div style="font-weight:700;font-size:17px;color:var(--text)" x-text="user?.name"></div>
          <div style="font-size:13px;color:var(--text-muted)" x-text="user?.role"></div>
        </div>
      </div>

      <div style="text-align:center;color:var(--text-muted);font-size:15px;margin-bottom:14px">
        Ingresa tu PIN de 4 dígitos
      </div>

      <div class="vb-pin-dots" :class="{ ok: pinOk, err: pinErr }">
        <template x-for="(filled, i) in dots" :key="i">
          <div class="vb-pin-dot" :class="{ filled }"></div>
        </template>
      </div>

      <div class="vb-login-error" x-show="error" x-text="error" x-cloak></div>
      <div x-show="!error" style="min-height:28px"></div>

      <div class="vb-keypad">
        <template x-for="k in ['1','2','3','4','5','6','7','8','9','','0','⌫']" :key="k">
          <button
            class="vb-key"
            :class="{ 'vb-key-back': k === '⌫', invisible: k === '' }"
            @click="k === '⌫' ? backspace() : k !== '' ? pressKey(k) : null"
            :disabled="pinOk">
            <template x-if="k === '⌫'">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            </template>
            <template x-if="k !== '⌫'">
              <span x-text="k"></span>
            </template>
          </button>
        </template>
      </div>
    </div>

    <div class="vb-login-foot">VerdeBlock POS · v1.0</div>
  </div>
</div>

</body>
</html>
