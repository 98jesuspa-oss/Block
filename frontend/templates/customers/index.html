{% extends "base.html" %}
{% load static %}

{% block title %}Clientes — VerdeBlock POS{% endblock %}
{% block page_title %}Clientes{% endblock %}

{% block topbar_actions %}
<div class="vb-search">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input name="q" placeholder="Buscar cliente…"
         hx-get="{% url 'customers:table' %}"
         hx-trigger="keyup changed delay:350ms"
         hx-target="#customers-table"
         value="{{ request.GET.q|default:'' }}">
</div>
<button class="vb-btn vb-btn-primary vb-btn-md"
        hx-get="{% url 'customers:form' %}"
        hx-target="#modal-container"
        hx-swap="innerHTML">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Nuevo cliente
</button>
{% endblock %}

{% block content %}
<div id="customers-table">
  {% include "customers/partials/table.html" %}
</div>
<div id="modal-container"></div>
{% endblock %}
