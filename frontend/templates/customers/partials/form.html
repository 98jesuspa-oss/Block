<div class="vb-modal-backdrop" x-data @click.self="document.getElementById('modal-container').innerHTML=''">
  <div class="vb-modal" role="dialog" aria-modal="true">
    <div class="vb-modal-header">
      <h3>{{ cliente.pk|yesno:"Editar cliente,Nuevo cliente" }}</h3>
      <button class="vb-icon-btn" onclick="document.getElementById('modal-container').innerHTML=''" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form hx-post="{% if cliente.pk %}{% url 'customers:update' cliente.pk %}{% else %}{% url 'customers:create' %}{% endif %}"
          hx-target="#customers-table"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').innerHTML=''">
      {% csrf_token %}
      <div class="vb-modal-body">
        <div class="vb-form-row">
          <div class="vb-field">
            <label>Nombre o razon social</label>
            <input name="nombre" value="{{ cliente.nombre }}" required autofocus placeholder="Constructora Lopez S.A.">
          </div>
          <div class="vb-field">
            <label>Tipo de cliente</label>
            <select name="tipo">
              <option value="publico" {% if cliente.tipo == 'publico' %}selected{% endif %}>Publico general</option>
              <option value="mayoreo" {% if cliente.tipo == 'mayoreo' %}selected{% endif %}>Mayoreo</option>
            </select>
          </div>
        </div>
        <div class="vb-form-row">
          <div class="vb-field">
            <label>Telefono</label>
            <input name="tel" value="{{ cliente.tel }}" placeholder="669 233 0000" type="tel">
          </div>
          <div class="vb-field">
            <label>Correo electronico</label>
            <input name="email" value="{{ cliente.email }}" placeholder="contacto@empresa.com" type="email">
          </div>
        </div>
        <div class="vb-form-row">
          <div class="vb-field">
            <label>RFC</label>
            <input name="rfc" value="{{ cliente.rfc }}" placeholder="LOPL800101QX7" style="text-transform:uppercase">
          </div>
          <div class="vb-field">
            <label>Contacto</label>
            <input name="contacto" value="{{ cliente.contacto }}" placeholder="Nombre del contacto">
          </div>
        </div>
        <div class="vb-field">
          <label>Direccion</label>
          <input name="dir" value="{{ cliente.dir }}" placeholder="Calle, colonia, ciudad">
        </div>
      </div>
      <div class="vb-modal-footer">
        <div style="flex:1"></div>
        <button type="button" class="vb-btn vb-btn-ghost vb-btn-md" onclick="document.getElementById('modal-container').innerHTML=''">Cancelar</button>
        <button type="submit" class="vb-btn vb-btn-primary vb-btn-md">{{ cliente.pk|yesno:"Guardar cambios,Crear cliente" }}</button>
      </div>
    </form>
  </div>
</div>
