{% extends "base.html" %}
{% load static %}

{% block title %}Reportes — VerdeBlock POS{% endblock %}
{% block page_title %}Reportes{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap">
  <select name="periodo" class="vb-select" style="width:auto"
          hx-get="{% url 'reports:index' %}"
          hx-trigger="change"
          hx-target="#reports-content"
          hx-swap="innerHTML">
    <option value="hoy" {% if periodo == 'hoy' %}selected{% endif %}>Hoy</option>
    <option value="semana" {% if periodo == 'semana' %}selected{% endif %}>Esta semana</option>
    <option value="mes" {% if periodo == 'mes' %}selected{% endif %}>Este mes</option>
    <option value="custom" {% if periodo == 'custom' %}selected{% endif %}>Personalizado</option>
  </select>
  {% if periodo == 'custom' %}
  <form hx-get="{% url 'reports:index' %}" hx-target="#reports-content" hx-swap="innerHTML" style="display:contents">
    <input type="hidden" name="periodo" value="custom">
    <input type="date" name="desde" value="{{ desde }}" class="vb-input-sm">
    <input type="date" name="hasta" value="{{ hasta }}" class="vb-input-sm">
    <button type="submit" class="vb-btn vb-btn-primary vb-btn-sm">Buscar</button>
  </form>
  {% endif %}
  <a href="{% url 'reports:resumen' %}" class="vb-btn vb-btn-md" style="margin-left:auto;border:1.5px solid var(--border-strong);background:var(--bg-elev);color:var(--text)">Resumen mensual</a>
</div>

<div id="reports-content">
  {% include "reports/partials/content.html" %}
</div>
{% endblock %}
